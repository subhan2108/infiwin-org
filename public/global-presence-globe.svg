<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Global presence globe</title>
  <desc id="desc">A premium blue glass globe showing INFIWIN presence across GCC, India, and Southeast Asia.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#f6f9ff"/>
      <stop offset="100%" stop-color="#edf4ff"/>
    </radialGradient>
    <radialGradient id="sphere" cx="36%" cy="26%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="32%" stop-color="#dbeafe" stop-opacity="0.92"/>
      <stop offset="68%" stop-color="#93c5fd" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#4385f5"/>
    </radialGradient>
    <linearGradient id="land" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" x2="1">
      <stop offset="0%" stop-color="#4385f5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4385f5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4385f5" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="34" stdDeviation="32" flood-color="#1d4ed8" flood-opacity="0.18"/>
    </filter>
    <filter id="pinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#2563eb" flood-opacity="0.26"/>
    </filter>
    <clipPath id="clipSphere">
      <circle cx="600" cy="415" r="250"/>
    </clipPath>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v64" fill="none" stroke="#d9e6f7" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" rx="18" fill="url(#bg)"/>
  <rect x="84" y="118" width="1032" height="594" fill="url(#grid)" opacity="0.35"/>

  <g filter="url(#shadow)">
    <circle cx="600" cy="415" r="250" fill="url(#sphere)"/>
    <g clip-path="url(#clipSphere)">
      <path d="M417 330c38-48 83-78 136-90 56-13 103-6 141 20 23 16 47 19 72 8 34-14 69-6 105 25 36 31 51 69 45 114-6 47-32 83-78 108-41 23-88 29-141 18-35-7-66 1-92 24-36 31-82 47-138 48-51 1-94-13-129-43-34-29-51-65-51-108 0-43 43-84 130-124z" fill="url(#land)"/>
      <path d="M612 572c39 9 70 30 92 63 22 33 28 68 16 104-10 31-30 54-59 69-28 15-60 18-95 8-14-46-16-91-7-137 9-45 27-81 53-107z" fill="url(#land)" opacity="0.85"/>
      <path d="M760 294c52-36 105-47 160-31 44 12 73 37 87 75 13 35 6 68-22 99-27 31-67 46-118 46-25 0-47 9-65 28-21 22-48 32-82 30-39-2-70-18-93-48-22-29-31-63-25-101 7-41 59-74 158-98z" fill="url(#land)" opacity="0.75"/>
      <path d="M472 554c28 10 50 28 66 56 16 27 19 56 8 86-10 27-30 47-58 58-28 12-58 11-90-4 0-39 7-76 22-111 14-35 31-63 52-85z" fill="url(#land)" opacity="0.72"/>
      <path d="M350 415h500M600 165v500M417 230c62 64 306 64 366 0M417 600c62-64 306-64 366 0" fill="none" stroke="#ffffff" stroke-opacity="0.38" stroke-width="2"/>
      <ellipse cx="600" cy="415" rx="155" ry="250" fill="none" stroke="#ffffff" stroke-opacity="0.34" stroke-width="2"/>
      <ellipse cx="600" cy="415" rx="250" ry="104" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="2"/>
    </g>
    <circle cx="600" cy="415" r="250" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="3"/>
    <path d="M442 234c53-43 116-66 188-70" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.32"/>
  </g>

  <g fill="none" stroke="url(#arc)" stroke-width="5" stroke-linecap="round">
    <path d="M598 416c68-57 142-71 222-43"/>
    <path d="M598 416c32 40 82 70 150 91"/>
    <path d="M598 416c-39 14-77 36-116 67"/>
  </g>

  <g filter="url(#pinShadow)">
    <g transform="translate(598 416)">
      <circle r="43" fill="#4385f5" opacity="0.18"/>
      <circle r="27" fill="#4385f5"/>
      <path d="M0 13s12-12 12-24A12 12 0 0 0-12-11c0 12 12 24 12 24Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
      <circle r="4.5" fill="#fff"/>
    </g>
    <g transform="translate(748 507)">
      <circle r="22" fill="#4385f5" opacity="0.18"/>
      <circle r="12" fill="#4385f5"/>
      <circle r="4" fill="#fff"/>
    </g>
    <g transform="translate(820 373)">
      <circle r="22" fill="#4385f5" opacity="0.18"/>
      <circle r="12" fill="#4385f5"/>
      <circle r="4" fill="#fff"/>
    </g>
    <g transform="translate(482 483)">
      <circle r="20" fill="#4385f5" opacity="0.16"/>
      <circle r="10" fill="#4385f5"/>
      <circle r="3.5" fill="#fff"/>
    </g>
  </g>

  <ellipse cx="600" cy="706" rx="285" ry="36" fill="#1d4ed8" opacity="0.08"/>
</svg>
